<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Characters - Spirit Blossom Hub</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container mx-auto px-4">
            <h1>Spirit Blossom Hub</h1>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/characters">Characters</a></li>
                <li><a href="/tier-list">Tier List</a></li>
                <li><a href="/auth">Auth</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <a href="/" class="back-link">&larr; Home</a>
        <h1>CHARACTER PROFILES</h1>
        <p>Explore the legends. Click any character to see full stats, abilities, and lore.</p>

        <div class="characters-grid">
            {% for char in characters %}
            <div class="character-card">
                <a href="/characters/{{ char.id }}">
                    <img src="{{ char.image }}" alt="{{ char.name }}">
                    <h3>{{ char.name }}</h3>
                    <p>{{ char.anime }}</p>
                    <span class="tier {{ char.tier }}">{{ char.tier }}</span>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Spirit Blossom Hub</p>
    </footer>
</body>
</html>
